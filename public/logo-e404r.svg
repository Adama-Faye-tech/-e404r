<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Cyber Blue gradient -->
    <linearGradient id="cyberBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0090CC"/>
    </linearGradient>
    <!-- AI Green gradient -->
    <linearGradient id="aiGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF88"/>
      <stop offset="100%" stop-color="#00CC6E"/>
    </linearGradient>
    <!-- Glow filter blue -->
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow filter green -->
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>

  <!-- Outer hexagon frame -->
  <polygon
    points="100,12 176,56 176,144 100,188 24,144 24,56"
    stroke="url(#cyberBlue)"
    stroke-width="1.5"
    fill="none"
    opacity="0.4"
  />

  <!-- Inner hexagon -->
  <polygon
    points="100,30 162,65 162,135 100,170 38,135 38,65"
    stroke="url(#cyberBlue)"
    stroke-width="1"
    fill="none"
    opacity="0.2"
  />

  <!-- Circuit traces — horizontal left -->
  <line x1="24" y1="100" x2="46" y2="100" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <circle cx="46" cy="100" r="2" fill="#00D4FF" opacity="0.7"/>
  <line x1="46" y1="100" x2="46" y2="84" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>

  <!-- Circuit traces — right -->
  <line x1="154" y1="100" x2="176" y2="100" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  <circle cx="154" cy="100" r="2" fill="#00D4FF" opacity="0.7"/>
  <line x1="154" y1="100" x2="154" y2="116" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>

  <!-- Circuit traces — top -->
  <line x1="100" y1="12" x2="100" y2="36" stroke="#00FF88" stroke-width="1" opacity="0.4"/>
  <circle cx="100" cy="36" r="2" fill="#00FF88" opacity="0.6"/>

  <!-- Circuit traces — bottom -->
  <line x1="100" y1="164" x2="100" y2="188" stroke="#00FF88" stroke-width="1" opacity="0.4"/>
  <circle cx="100" cy="164" r="2" fill="#00FF88" opacity="0.6"/>

  <!-- Corner dots -->
  <circle cx="60" cy="48" r="2.5" fill="#00D4FF" opacity="0.5" filter="url(#glowBlue)"/>
  <circle cx="140" cy="48" r="2.5" fill="#00D4FF" opacity="0.5" filter="url(#glowBlue)"/>
  <circle cx="60" cy="152" r="2.5" fill="#00FF88" opacity="0.5" filter="url(#glowGreen)"/>
  <circle cx="140" cy="152" r="2.5" fill="#00FF88" opacity="0.5" filter="url(#glowGreen)"/>

  <!-- E404R Text — main -->
  <text
    x="100"
    y="112"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="26"
    font-weight="700"
    fill="url(#cyberBlue)"
    text-anchor="middle"
    letter-spacing="2"
    filter="url(#glowBlue)"
  >E404R</text>

  <!-- Tagline -->
  <text
    x="100"
    y="130"
    font-family="'Inter', system-ui, sans-serif"
    font-size="7"
    fill="#00FF88"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.8"
    font-weight="500"
  >ENGINE 404 ROUTER</text>

  <!-- Top accent line -->
  <line x1="60" y1="86" x2="140" y2="86" stroke="url(#cyberBlue)" stroke-width="0.5" opacity="0.4"/>

  <!-- Bottom accent line -->
  <line x1="60" y1="136" x2="140" y2="136" stroke="url(#aiGreen)" stroke-width="0.5" opacity="0.4"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="3" fill="url(#cyberBlue)" filter="url(#glowBlue)" opacity="0.8"/>
</svg>
